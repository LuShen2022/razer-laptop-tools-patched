name: Build Razer Laptop Tools

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Build blade-helper
      run: cargo build --release --manifest-path librazer/Cargo.toml

    - name: Upload blade-helper.exe
      uses: actions/upload-artifact@v3
      with:
        name: blade-helper-exe
        path: librazer\target\release\blade-helper.exe
