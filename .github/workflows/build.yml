name: Build Razer Laptop Tools

# 触发条件：push 或手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 避免 Node.js 20 废弃警告

    steps:
    # 1️⃣ 拉取源码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ 安装 Rust
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    # 3️⃣ 更新依赖
    - name: Update dependencies
      run: cargo update --manifest-path librazer/Cargo.toml

    # 4️⃣ 构建 blade-helper.exe
    - name: Build blade-helper
      run: cargo build --release --manifest-path librazer/Cargo.toml --verbose

    # 5️⃣ 列出编译目录确认 exe
    - name: List blade-helper files
      run: dir librazer\target\release

    # 6️⃣ 上传 blade-helper.exe
    - name: Upload blade-helper.exe
      uses: actions/upload-artifact@v4
      with:
        name: blade-helper-exe
        path: librazer/target/release/blade-helper.exe

    # 7️⃣ 可选：编译 bhelper.exe
    # - name: Build bhelper
    #   run: cargo build --release --manifest-path bhelper/Cargo.toml --verbose
    #
    # - name: List bhelper files
    #   run: dir bhelper\target\release
    #
    # - name: Upload bhelper.exe
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: bhelper-exe
    #     path: bhelper/target/release/bhelper.exe
