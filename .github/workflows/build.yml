name: Build Razer Laptop Tools

# 触发条件：push 或手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 避免 Node.js 20 废弃警告

    steps:
    # 1️⃣ 拉取源码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ 安装 Rust
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    # 3️⃣ 更新依赖
    - name: Update dependencies
      run: cargo update --manifest-path bhelper/Cargo.toml

    # 4️⃣ 编译 blade-helper.exe（指向 binary crate）
    - name: Build blade-helper
      run: cargo build --release --manifest-path bhelper/Cargo.toml --verbose

    # 5️⃣ 列出生成文件，确认 blade-helper.exe
    - name: List release files
      run: dir bhelper\target\release

    # 6️⃣ 上传 blade-helper.exe
    - name: Upload blade-helper.exe
      uses: actions/upload-artifact@v4
      with:
        name: blade-helper-exe
        path: bhelper/target/release/blade-helper.exe
