name: Build Razer Laptop Tools

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1️⃣ 拉取源码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ 安装 Rust
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    # 3️⃣ 更新依赖
    - name: Update dependencies
      run: cargo update --manifest-path bhelper/Cargo.toml

    # 4️⃣ 编译 bhelper.exe 并保存日志
    - name: Build bhelper.exe and save log
      run: |
        mkdir -Force logs
        $ErrorActionPreference="Continue"
        cargo build --release --manifest-path bhelper/Cargo.toml --verbose *> logs/build.log 2>&1 || echo "Compile failed, see logs/build.log"

    # 5️⃣ 列出生成文件（如果目录存在）
    - name: List release files
      run: |
        if (Test-Path bhelper\target\release) {
          dir bhelper\target\release
        } else {
          echo "Release directory does not exist"
        }

    # 6️⃣ 上传 release 目录下所有文件（包括 bhelper.exe）
    - name: Upload bhelper.exe
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: bhelper-exe
        path: bhelper/target/release/*

    # 7️⃣ 上传编译日志
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: logs/build.log
